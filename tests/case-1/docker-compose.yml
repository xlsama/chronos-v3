services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      POSTGRES_DB: chronos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  target:
    build:
      context: .
      dockerfile_inline: |
        FROM ubuntu:22.04
        RUN apt-get update && apt-get install -y openssh-server && rm -rf /var/lib/apt/lists/*
        RUN mkdir -p /run/sshd
        RUN echo 'root:testpassword' | chpasswd
        RUN sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        RUN echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config
        EXPOSE 22
        CMD ["/usr/sbin/sshd", "-D"]
    ports:
      - "12222:22"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/22'"]
      interval: 3s
      timeout: 3s
      start_period: 5s
      retries: 10
