services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      POSTGRES_DB: chronos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  data-server:
    build:
      context: data-server
    ports:
      - "12224:22"
      - "18081:8080"
    networks:
      - case2-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 20

  app-server:
    build:
      context: app-server
    ports:
      - "12223:22"
      - "18080:80"
    networks:
      - case2-net
    depends_on:
      data-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      start_period: 15s
      retries: 20

networks:
  case2-net:
    driver: bridge
