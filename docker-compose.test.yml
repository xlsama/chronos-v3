# Test infrastructure - isolated ports to avoid dev env collision
# Usage: docker compose -f docker-compose.test.yml up -d --wait
services:
  postgres-test:
    image: pgvector/pgvector:pg17
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: chronos_test
      POSTGRES_PASSWORD: chronos_test
      POSTGRES_DB: chronos_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos_test"]
      interval: 3s
      timeout: 2s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10

  # Target databases for agent integration tests
  mysql-target:
    image: mysql:8.0
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 2s
      retries: 10

  postgres-target:
    image: postgres:17
    ports:
      - "15433:5432"
    environment:
      POSTGRES_USER: target_user
      POSTGRES_PASSWORD: target_pass
      POSTGRES_DB: target_db
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U target_user"]
      interval: 3s
      timeout: 2s
      retries: 10
