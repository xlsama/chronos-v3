# Target databases for agent integration tests
# Usage: docker compose -f server/tests/agent/docker-compose.agent.yml up -d --wait
services:
  mysql-target:
    image: mysql:8.0
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 2s
      retries: 10

  mongo-target:
    image: mongo:7
    ports:
      - "17017:27017"
    tmpfs:
      - /data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 3s
      timeout: 2s
      retries: 10

  postgres-target:
    image: postgres:17
    ports:
      - "15433:5432"
    environment:
      POSTGRES_USER: target_user
      POSTGRES_PASSWORD: target_pass
      POSTGRES_DB: target_db
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U target_user"]
      interval: 3s
      timeout: 2s
      retries: 10
