services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronos}
      POSTGRES_DB: chronos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: server/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://chronos:${POSTGRES_PASSWORD:-chronos}@postgres:5432/chronos
      LANGGRAPH_CHECKPOINT_DSN: postgresql://chronos:${POSTGRES_PASSWORD:-chronos}@postgres:5432/chronos
      REDIS_URL: redis://redis:6379/0
    volumes:
      - chronos-data:/app/data

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  pgdata:
  redisdata:
  chronos-data:
